services:
  robo-call-service:
    image: ghcr.io/ansimran/microservice-robo-call/robo-call-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robo-call-service
    env_file: .env
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "127.0.0.1:8000:8000"                # Bind to loopback only — reachable from the EC2 host but NOT from the internet.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
